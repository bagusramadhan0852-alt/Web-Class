<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri XII TAV</title>

<style>
:root{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#222;
    --primary:#2563eb;
}

body.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#ffffff;
    --primary:#60a5fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:.3s;
}

nav{
    background:var(--card);
    padding:15px;
    position:sticky;
    top:0;
    border-bottom:1px solid rgba(128,128,128,.2);
    z-index:100;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:var(--text);
    font-weight:bold;
}

nav a:hover{
    color:var(--primary);
}

.active{
    color:var(--primary);
}

#themeBtn{
    position:fixed;
    right:15px;
    bottom:15px;
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:var(--primary);
    color:white;
    font-size:20px;
    cursor:pointer;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    color:var(--primary);
}

.gallery{
    max-width:1000px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:15px;
    transition:.3s;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.gallery img:hover{
    transform:scale(1.03);
}
</style>
</head>
<body>

<button id="themeBtn">🌙</button>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="index.html#profil">Profil</a></li>
<li><a href="index.html#struktur">Struktur</a></li>
<li><a href="galeri.html" class="active">Galeri</a></li>
</ul>
</nav>

<header>
<h1>Galeri XII TAV</h1>
<p>Dokumentasi kegiatan kelas</p>
</header>

<div class="gallery">

<img src="img/foto1.jpg" alt="Foto 1">
<img src="img/foto2.jpg" alt="Foto 2">
<img src="img/foto3.jpg" alt="Foto 3">
<img src="img/foto4.jpg" alt="Foto 4">
<img src="img/foto5.jpg" alt="Foto 5">
<img src="img/foto6.jpg" alt="Foto 6">

</div>

<script>
const btn = document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
    btn.innerHTML="☀️";
}

btn.addEventListener("click",()=>{
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        btn.innerHTML="☀️";
    }else{
        localStorage.setItem("theme","light");
        btn.innerHTML="🌙";
    }
});
</script>

</body>
</html>
